services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    container_name: retainly_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - media_data:/retainly/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:  # Map container port 8000 to localhost port 8000
      - "127.0.0.1:8000:8000"
    command: >
      gunicorn -k uvicorn.workers.UvicornWorker
      app.core.main:app
      --bind 0.0.0.0:8000
      --workers 1
      --timeout 120
      --max-requests 1000
      --max-requests-jitter 50

  db:
    image: postgres:18-alpine
    container_name: retainly_db
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: retainly_redis
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: >
      sh -c "exec redis-server
      --appendonly yes
      --requirepass $$REDIS_PASSWORD
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru"
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    container_name: retainly_celery_worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - media_data:/retainly/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.celery worker
      --loglevel=info
      --concurrency=1
      --max-tasks-per-child=50
      --max-memory-per-child=100000

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    container_name: retainly_celery_beat
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
  media_data:
